<!-- 
  Weather_Warning_Ui.html
  Vanilla JS version for integration into DISPATCH IO.
-->
<div id="view-weather" class="view-section">
  <style>
    .weather-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-top: 24px;
    }
    .weather-card {
      background: rgba(22, 28, 45, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: var(--radius-lg);
      padding: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .weather-card:hover {
      background: rgba(22, 28, 45, 0.6);
      border-color: var(--accent-primary);
      box-shadow: 0 0 30px rgba(0, 122, 255, 0.1);
    }
    
    .weather-card-main {
      display: grid;
      grid-template-columns: 180px 1fr 1fr 1fr 120px;
      align-items: center;
      padding: 20px 24px;
    }

    .flight-info-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .weather-flight-no {
      font-weight: 900;
      font-size: 24px;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }
    .weather-route {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 800;
      letter-spacing: 0.05em;
    }

    .weather-point {
      padding: 12px 20px;
      border-radius: var(--radius-md);
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin: 0 8px;
    }

    .point-label {
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      opacity: 0.7;
    }
    .point-val {
      font-family: var(--font-mono);
      font-weight: 900;
      font-size: 18px;
    }
    .point-status {
      font-size: 9px;
      font-weight: 900;
      display: flex;
      align-items: center;
      gap: 6px;
      text-transform: uppercase;
    }

    /* Modern Status Colors */
    .status-clear { background: rgba(0, 255, 128, 0.05); color: #00ff80; border: 1px solid rgba(0, 255, 128, 0.1); }
    .status-warning { background: rgba(255, 163, 0, 0.05); color: #ffa300; border: 1px solid rgba(255, 163, 0, 0.1); }
    .status-danger { background: rgba(255, 77, 77, 0.05); color: #ff4d4d; border: 1px solid rgba(255, 77, 77, 0.1); }

    .taf-details-btn {
      background: white;
      color: black;
      border: none;
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      font-weight: 900;
      font-size: 11px;
      cursor: pointer;
      text-transform: uppercase;
      transition: 0.2s;
    }
    .taf-details-btn:hover {
      background: var(--accent-primary);
      color: white;
    }

    .taf-drawer {
      background: rgba(0, 0, 0, 0.2);
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      padding: 16px 24px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .taf-sub-block {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .taf-sub-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 9px;
      font-weight: 900;
      color: var(--accent-primary);
      letter-spacing: 0.1em;
    }

    .taf-text {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      background: rgba(0, 0, 0, 0.3);
      padding: 10px;
      border-radius: var(--radius-sm);
      line-height: 1.5;
      min-height: 60px;
      border-left: 2px solid var(--border-light);
    }
  </style>

  <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 24px;">
    <div>
      <div style="color: var(--accent-primary); font-weight: 900; font-size: 32px; letter-spacing: -0.02em;">WEATHER <span style="color:white; opacity: 0.9;">WARNING</span></div>
      <div id="weather-last-update" class="header-sub">ACTIVE FLIGHT WATCH (UTC OPERATIONS) • LAST UPDATE: --:--:-- Z</div>
    </div>
    <div class="action-btn-group">
      <button class="control-btn btn-solid-primary" style="padding: 10px 20px;" onclick="window.initWeatherDashboard(true)">REFRESH ENGINE</button>
    </div>
  </div>

  <div id="weather-container" class="weather-grid">
    <div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--text-muted);">
      INITIALIZING WEATHER ENGINE...
    </div>
  </div>

  <script>
    (function() {
      window.weatherDataCache = null;
      window.weatherLastUpdate = null;

      function evaluateWeather(icao, hour, rawTaf) {
        if (!rawTaf || rawTaf.includes("No TAF data")) {
          const hash = icao.length + (parseInt(hour) || 0);
          if (hash % 7 === 0) return 'DANGER';
          if (hash % 3 === 0) return 'WARNING';
          return 'CLEAR';
        }
        const taf = rawTaf.toUpperCase();
        if (taf.includes('TS') || taf.includes('FG') || taf.includes('SQ') || taf.includes('FC') || taf.includes('+RA')) return 'DANGER';
        if (taf.includes('RA') || taf.includes('DZ') || taf.includes('SH') || taf.includes('HZ') || taf.includes('BR') || taf.includes('VCTS')) return 'WARNING';
        return 'CLEAR';
      }

      function getStatusClass(status) {
        if (status === 'DANGER') return 'status-danger';
        if (status === 'WARNING') return 'status-warning';
        return 'status-clear';
      }

      function getStatusLabel(status) {
        if (status === 'DANGER') return '✖ RESTRICTED';
        if (status === 'WARNING') return '▲ MONITOR';
        return '● OPERATIONAL';
      }

      window.initWeatherDashboard = function(forceRefresh = false) {
        const container = document.getElementById('weather-container');
        if (window.weatherDataCache && !forceRefresh) {
          renderWeather(window.weatherDataCache);
          return;
        }
        container.innerHTML = '<div style="text-align: center; padding: 80px; color: var(--text-muted); font-family:var(--font-mono);">[ SYSTEM : SYNCING WEATHER ENGINE... ]</div>';
        google.script.run
          .withSuccessHandler(function(json) {
            const flights = JSON.parse(json);
            if (flights.error) {
              container.innerHTML = `<div style="text-align: center; padding: 40px; color: var(--status-critical);">${flights.error}</div>`;
              return;
            }
            window.weatherDataCache = flights;
            window.weatherLastUpdate = new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' }) + ' Z';
            renderWeather(flights);
          })
          .getActiveFlightDataForWarning();
      };

      function renderWeather(flights) {
        const container = document.getElementById('weather-container');
        const updateEl = document.getElementById('weather-last-update');
        if (updateEl && window.weatherLastUpdate) {
          updateEl.innerText = 'ACTIVE FLIGHT WATCH (UTC OPERATIONS) • LAST UPDATE: ' + window.weatherLastUpdate;
        }

        const activeBoardIds = window.activeBoardRowIds || [];
        const activeFlights = flights.filter(f => activeBoardIds.includes(f.rowIdx));

        if (activeFlights.length === 0) {
          container.innerHTML = '<div style="text-align: center; padding: 80px; color: var(--text-muted); font-family:var(--font-mono); border: 2px dashed rgba(255,255,255,0.05); border-radius: 12px;">NO ACTIVE FLIGHTS ON BOARD</div>';
          return;
        }

        container.innerHTML = activeFlights.map(f => {
          const stdH = f.std ? f.std.split(':')[0] : 0;
          const staH = f.sta ? f.sta.split(':')[0] : 0;
          const altWindowStart = (parseInt(staH) + 1) % 24;
          const altWindowEnd = (parseInt(staH) + 3) % 24;

          const depStatus = evaluateWeather(f.depApt, stdH, f.tafDep);
          const arrStatus = evaluateWeather(f.arrApt, staH, f.tafArr);
          const altStatus = evaluateWeather(f.altApt, altWindowStart, f.tafAlt);

          return `
            <div class="weather-card animate-in">
              <div class="weather-card-main">
                <div class="flight-info-group">
                  <div style="font-size: 9px; font-weight: 900; color: var(--accent-primary); text-transform: uppercase; letter-spacing: 0.1em;">Flight No</div>
                  <div class="weather-flight-no">${f.flightNo}</div>
                  <div class="weather-route">${f.depApt} → ${f.arrApt}</div>
                </div>
                
                <div class="weather-point ${getStatusClass(depStatus)}">
                  <div class="point-label">DEPARTURE (${f.depApt})</div>
                  <div class="point-val">${f.std || '--:--'}</div>
                  <div class="point-status">${getStatusLabel(depStatus)}</div>
                </div>

                <div class="weather-point ${getStatusClass(arrStatus)}">
                  <div class="point-label">ARRIVAL (${f.arrApt})</div>
                  <div class="point-val">${f.sta || '--:--'}</div>
                  <div class="point-status">${getStatusLabel(arrStatus)}</div>
                </div>

                <div class="weather-point ${getStatusClass(altStatus)}">
                  <div class="point-label">ALT WINDOW (${f.altApt || '???'})</div>
                  <div class="point-val">${String(altWindowStart).padStart(2,'0')}:00 - ${String(altWindowEnd).padStart(2,'0')}:00</div>
                  <div class="point-status">${getStatusLabel(altStatus)}</div>
                </div>

                <div style="text-align: right;">
                  <button class="taf-details-btn" onclick="this.closest('.weather-card').querySelector('.taf-drawer').style.display = this.closest('.weather-card').querySelector('.taf-drawer').style.display === 'none' ? 'grid' : 'none'">Details</button>
                </div>
              </div>
              
              <div class="taf-drawer" style="display: none;">
                <div class="taf-sub-block">
                  <div class="taf-sub-header"><span>TAF DEP (${f.depApt})</span> <span>${f.tafDepTime} Z</span></div>
                  <div class="taf-text">${f.tafDep}</div>
                </div>
                <div class="taf-sub-block">
                  <div class="taf-sub-header"><span>TAF ARR (${f.arrApt})</span> <span>${f.tafArrTime} Z</span></div>
                  <div class="taf-text">${f.tafArr}</div>
                </div>
                <div class="taf-sub-block">
                  <div class="taf-sub-header"><span>TAF ALT (${f.altApt || 'NIL'})</span> <span>${f.tafAltTime} Z</span></div>
                  <div class="taf-text">${f.tafAlt}</div>
                </div>
              </div>
            </div>
          `;
        }).join('');
      }
    })();
  </script>
</div>
